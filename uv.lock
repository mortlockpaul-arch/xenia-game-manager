version = 1
revision = 3
requires-python = ">=3.10.10"
resolution-markers = [
    "python_full_version >= '3.13' and sys_platform == 'win32'",
    "platform_machine == 'x86_64' and sys_platform == 'linux'",
    "platform_machine == 'i686' and sys_platform == 'linux'",
    "platform_machine == 'aarch64' and sys_platform == 'linux'",
    "platform_machine == 'armv7l' and sys_platform == 'linux'",
    "platform_machine == 'ppc64le' and sys_platform == 'linux'",
    "platform_machine == 's390x' and sys_platform == 'linux'",
    "(python_full_version < '3.13' and sys_platform == 'win32') or (platform_machine != 'aarch64' and platform_machine != 'armv7l' and platform_machine != 'i686' and platform_machine != 'ppc64le' and platform_machine != 's390x' and platform_machine != 'x86_64' and sys_platform == 'linux') or (sys_platform != 'linux' and sys_platform != 'win32')",
]

[[package]]
name = "pythonproject"
version = "0.1.0"
source = { virtual = "." }
